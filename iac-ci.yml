# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / iac-ci.yml
#
# CI template for IaC projects (OpenTofu + tflint + linting).
# Copy to .forgejo/workflows/ci.yml and adjust the versions.
#
# Images: tcwlab/betterlint, tcwlab/opentofu (Docker Hub)
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Maintain versions centrally here ──────────────────────────────────────────
env:
  BETTERLINT_VERSION: "2.12.0"
  OPENTOFU_VERSION: "1.10.0"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint (betterlint)
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint (betterlint)
        run: betterlint --dir .

  # ---------------------------------------------------------------------------
  tofu-fmt:
    name: OpenTofu fmt
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: tofu fmt -check -recursive
        run: tofu fmt -check -recursive

  # ---------------------------------------------------------------------------
  tofu-validate:
    name: OpenTofu validate
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Validate all *.tf directories
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find . -name '*.tf' \
            -not -path '*/.git/*' -not -path '*/.terraform/*' \
            -exec dirname {} \; | sort -u)
          [ "${#dirs[@]}" -eq 0 ] && { echo "No .tf files found — skipped."; exit 0; }
          for d in "${dirs[@]}"; do
            echo "::group::tofu validate $d"
            (cd "$d" && tofu init -backend=false -input=false -no-color && tofu validate -no-color)
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  tflint:
    name: tflint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: tflint --recursive
        run: |
          tflint --init
          tflint --recursive --format compact
