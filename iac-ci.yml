# ─────────────────────────────────────────────────────────────────────────────
# chameleon-ci / templates / iac-ci.yml
#
# CI-Template für IaC-Projekte (OpenTofu + tflint + Linting).
# Kopieren nach .forgejo/workflows/ci.yml und VERSIONS anpassen.
#
# Images: tcwlab/betterlint, tcwlab/opentofu, tcwlab/tflint (Docker Hub)
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Versionen hier zentral pflegen ───────────────────────────────────────────
env:
  BETTERLINT_VERSION: "1.0.0"
  OPENTOFU_VERSION: "1.10.0"
  TFLINT_VERSION: "0.54.0"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ShellCheck
        run: |
          mapfile -t scripts < <(find . -name '*.sh' -not -path './.git/*')
          [ "${#scripts[@]}" -eq 0 ] && exit 0
          shellcheck --severity=warning "${scripts[@]}"

      - name: Markdown
        run: markdownlint-cli2 --config .markdownlint.json "**/*.md" "#node_modules"

      - name: Conventional Commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FROM="${{ github.event.pull_request.base.sha }}"
          else
            FROM="${{ github.event.before }}"
            [[ "$FROM" =~ ^0+$ ]] && FROM="HEAD~1"
          fi
          npm install --no-save @commitlint/cli@19 @commitlint/config-conventional@19
          npx commitlint --config .commitlintrc.json --from "$FROM" --to HEAD

  # ---------------------------------------------------------------------------
  tofu-fmt:
    name: Tofu fmt
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: tofu fmt -check -recursive
        run: tofu fmt -check -recursive

  # ---------------------------------------------------------------------------
  tofu-validate:
    name: Tofu validate
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Validate all *.tf directories
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find . -name '*.tf' \
            -not -path '*/.git/*' -not -path '*/.terraform/*' \
            -exec dirname {} \; | sort -u)
          [ "${#dirs[@]}" -eq 0 ] && { echo "Keine .tf-Dateien — übersprungen."; exit 0; }
          for d in "${dirs[@]}"; do
            echo "::group::tofu validate $d"
            (cd "$d" && tofu init -backend=false -input=false -no-color && tofu validate -no-color)
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  tflint:
    name: tflint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/tflint:${{ env.TFLINT_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: tflint --recursive
        run: |
          tflint --init
          tflint --recursive --format compact
