# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / iac-ci.yml
#
# CI template for IaC projects (OpenTofu + tflint + linting).
# Copy to .forgejo/workflows/ci.yml and adjust the versions.
#
# Images: tcwlab/betterlint, tcwlab/opentofu (Docker Hub)
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ── Maintain versions centrally here ──────────────────────────────────────────
env:
  BETTERLINT_VERSION: "2.12.0"
  OPENTOFU_VERSION: "1.10.0"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint (betterlint)
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      # Shell-based checkout: tcwlab/betterlint and tcwlab/opentofu ship
      # without Node.js, so the JS-based actions/checkout cannot run here.
      # depth=1 is enough — betterlint's commitlint only inspects `git log -1`.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Lint (betterlint)
        run: betterlint --dir .

  # ---------------------------------------------------------------------------
  tofu-fmt:
    name: OpenTofu fmt
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      # Shell-based checkout — tcwlab/opentofu ships without Node.js.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: tofu fmt -check -recursive
        run: tofu fmt -check -recursive

  # ---------------------------------------------------------------------------
  tofu-validate:
    name: OpenTofu validate
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/opentofu:${{ env.OPENTOFU_VERSION }}
    steps:
      # Shell-based checkout — tcwlab/opentofu ships without Node.js.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: Validate all *.tf directories
        run: |
          set -euo pipefail
          mapfile -t dirs < <(find . -name '*.tf' \
            -not -path '*/.git/*' -not -path '*/.terraform/*' \
            -exec dirname {} \; | sort -u)
          [ "${#dirs[@]}" -eq 0 ] && { echo "No .tf files found — skipped."; exit 0; }
          for d in "${dirs[@]}"; do
            echo "::group::tofu validate $d"
            (cd "$d" && tofu init -backend=false -input=false -no-color && tofu validate -no-color)
            echo "::endgroup::"
          done

  # ---------------------------------------------------------------------------
  tflint:
    name: tflint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      # Shell-based checkout — tcwlab/betterlint ships without Node.js.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: tflint --recursive
        run: |
          tflint --init
          tflint --recursive --format compact
