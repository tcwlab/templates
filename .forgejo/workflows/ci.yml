# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / .forgejo/workflows/ci.yml
#
# Self-linting pipeline for this repo.
# Lints the workflow templates (*.yml), docs (*.md), and wrapper scripts (*.sh)
# in this repo itself. Dogfooding: the repo that provides CI templates
# lints itself with the same pattern consumers copy on bootstrap.
#
# Image: tcwlab/betterlint (Docker Hub) — single-job variant of
# service-ci.yml linting skeleton without service-specific steps (OpenAPI, Gherkin).
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint (betterlint)
    runs-on: ubuntu-22.04
    # NOTE: Forgejo's workflow schema validator rejects `${{ env.X }}` inside
    # `container.image` ("Unknown Variable Access env"). Hardcode the tag here.
    # When bumping betterlint, update this single line.
    container:
      image: tcwlab/betterlint:2.13.0
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint (betterlint)
        run: betterlint --dir .
