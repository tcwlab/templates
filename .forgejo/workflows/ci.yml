# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / .forgejo/workflows/ci.yml
#
# Self-linting pipeline for this repo.
# Lints the workflow templates (*.yml), docs (*.md), and wrapper scripts (*.sh)
# in this repo itself. Dogfooding: the repo that provides CI templates
# lints itself with the same pattern consumers copy on bootstrap.
#
# Image: tcwlab/betterlint (Docker Hub) — single-job variant of
# service-ci.yml linting skeleton without service-specific steps (OpenAPI, Gherkin).
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint (betterlint)
    runs-on: ubuntu-22.04
    # NOTE: Forgejo's workflow schema validator rejects `${{ env.X }}` inside
    # `container.image` ("Unknown Variable Access env"). Hardcode the tag here.
    # When bumping betterlint, update this single line.
    container:
      image: tcwlab/betterlint:2.13.0
    steps:
      # Shell-based checkout: the tcwlab/betterlint image ships without
      # Node.js, so the JS-based actions/checkout cannot run here.
      # depth=1 is enough — betterlint's commitlint only inspects `git log -1`.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Lint (betterlint)
        run: betterlint --dir .
