  #         git fetch --depth=1 origin "${GITHUB_SHA}" && git checkout FETCH_HEAD
  #     - name: Create release tag
  #       env:
  #         FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  #       run: |
  #         TOOL_VER=$(grep '^ARG <TOOL>_VERSION=' Dockerfile | head -1 | cut -d= -f2)
  #         SHA8="${GITHUB_SHA:0:8}"
  #         TAG="v${TOOL_VER}-${SHA8}"
  #         PAYLOAD=$(printf '{"tag_name":"%s","target":"%s"}' "${TAG}" "${GITHUB_SHA}")
