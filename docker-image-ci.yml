# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / docker-image-ci.yml
#
# CI template for Docker image repos (tool wrappers, CI helper images).
# Copy to .forgejo/workflows/ci.yml and adjust the marked locations.
#
# Job sequence:
#   lint (optional)  →  build-test  →  security  →  release / auto-tag + publish
#
# Staging pattern: tcwlab/forgejo-build:<tool>-<sha>
# Trivy scans the staging image and writes the result as a Markdown
# table at the top of the PR description (idempotent via HTML marker).
#
# Secrets (Forgejo Repository Secrets):
#   FORGEJO_TOKEN      → API token for Forgejo (checkout + PR update)
#   DOCKERHUB_USERNAME → Docker Hub username
#   DOCKERHUB_TOKEN    → Docker Hub access token
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    # ── ADJUST: feature/* and/or claude/* depending on branching convention ──
    branches: [main, "feature/*", "claude/*"]
    # ── Only needed if publish via tag event (auto-tag + separate publish) ──
    # tags: ["v*-*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── ADJUST ────────────────────────────────────────────────────────────────
  IMAGE: tcwlab/<toolname>          # e.g. tcwlab/trivy, tcwlab/opentofu
  DOCKER_CLI_URL: https://download.docker.com/linux/static/stable/x86_64/docker-27.3.1.tgz

jobs:

  # ---------------------------------------------------------------------------
  # Optional: Dockerfile linting via tcwlab/betterlint
  # Omit if this repo is betterlint itself (bootstrap problem).
  # ---------------------------------------------------------------------------
  lint:
    name: Dockerfile lint
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:latest
    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD
      - name: hadolint
        run: betterlint --only hadolint

  # ---------------------------------------------------------------------------
  # Build, smoke test, and push to staging repo on Docker Hub.
  # Staging image: tcwlab/forgejo-build:<tool>-<sha>
  # Scanned by the security job; never released directly.
  # ---------------------------------------------------------------------------
  build-test:
    name: Build & smoke test (amd64)
    runs-on: ubuntu-22.04
    # If tcwlab/buildx is available as a container image, prefer it:
    # container:
    #   image: tcwlab/buildx:0.33.0
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      # Shell-based checkout: this job is meant to run in tcwlab/buildx
      # (see the commented container: block above), which ships without
      # Node.js — so the JS-based actions/checkout cannot run here.
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global init.defaultBranch main
          git init .
          git remote add origin \
            "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout FETCH_HEAD

      - name: Install Docker CLI
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker

      - name: Build (amd64)
        run: docker build -t "${{ env.IMAGE }}:test" .

      - name: Smoke test
        # ── ADJUST: tool-specific version command ──────────────────────────
        run: docker run --rm "${{ env.IMAGE }}:test" --version

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push to staging
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker tag "${{ env.IMAGE }}:test" "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"
          docker push "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}"

  # ---------------------------------------------------------------------------
  # Trivy scans the staging image and writes the result as a
  # Markdown table in the PR description (idempotent, HTML marker).
  # No exit-code != 0: doesn't block the pipeline, just informs.
  # ---------------------------------------------------------------------------
  security:
    name: Trivy security scan
    runs-on: ubuntu-22.04
    needs: [build-test]
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - name: Install Docker CLI
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker

      - name: Trivy scan (JSON)
        run: |
          TOOL=$(echo "${{ env.IMAGE }}" | cut -d'/' -f2)
          docker run --rm \
            -e TRIVY_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}" \
            -e TRIVY_PASSWORD="${{ secrets.DOCKERHUB_TOKEN }}" \
            tcwlab/trivy:0.70.0 image \
            --exit-code 0 --severity HIGH,CRITICAL --ignore-unfixed \
            --format json \
            "tcwlab/forgejo-build:${TOOL}-${{ github.sha }}" \
            > /tmp/trivy-report.json

      - name: Update PR description with Trivy result
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
          REPO: ${{ github.repository }}
          # ── ADJUST: replace <toolname> ──────────────────────────────────
          IMAGE_REF: "tcwlab/forgejo-build:<toolname>-${{ github.sha }}"
        run: |
          python3 << 'EOF'
          import os, json, re, urllib.request, urllib.error
          from datetime import datetime, timezone

          token    = os.environ["FORGEJO_TOKEN"]
          repo     = os.environ["REPO"]
          event    = os.environ["GITHUB_EVENT_NAME"]
          # Forgejo act_runner setzt GITHUB_API_URL, z.B. https://<forgejo-host>/api/v1
          base_url = os.environ["GITHUB_API_URL"]
          headers  = {"Authorization": f"token {token}", "Content-Type": "application/json"}

          def api_get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def api_patch(url, body):
              req = urllib.request.Request(
                  url, data=json.dumps(body).encode(), headers=headers, method="PATCH"
              )
              with urllib.request.urlopen(req) as r:
                  return r.status

          # Get PR number
          pr_number = None
          if event == "pull_request":
              pr_number = os.environ["PR_NUMBER"]
          else:
              branch = os.environ["HEAD_BRANCH"]
              try:
                  pulls = api_get(f"{base_url}/repos/{repo}/pulls?state=open&limit=50")
                  for pr in pulls:
                      if pr.get("head", {}).get("ref") == branch:
                          pr_number = str(pr["number"])
                          break
              except urllib.error.URLError as e:
                  print(f"PR search failed: {e}")

          if not pr_number:
              print("No open PR found — PR description not updated")
              exit(0)

          # Read Trivy JSON and build Markdown table
          with open("/tmp/trivy-report.json") as f:
              report = json.load(f)

          severity_icon = {"CRITICAL": "\U0001f534", "HIGH": "\U0001f7e0"}
          rows = []
          for result in report.get("Results", []):
              for vuln in result.get("Vulnerabilities") or []:
                  sev   = vuln.get("Severity", "")
                  pkg   = vuln.get("PkgName", "")
                  inst  = vuln.get("InstalledVersion", "")
                  fixed = vuln.get("FixedVersion", "") or "—"
                  cve   = vuln.get("VulnerabilityID", "")
                  url   = next(
                      (r for r in vuln.get("References", []) if "nvd.nist.gov" in r),
                      vuln.get("PrimaryURL", "")
                  )
                  cve_link = f"[{cve}]({url})" if url else cve
                  rows.append((sev, severity_icon.get(sev, "⚪"), pkg, inst, fixed, cve_link))

          order = {"CRITICAL": 0, "HIGH": 1}
          rows.sort(key=lambda r: (order.get(r[0], 9), r[2]))
          counts = {s: sum(1 for r in rows if r[0] == s) for s in ["CRITICAL", "HIGH"]}
          total  = sum(counts.values())

          if total == 0:
              summary = "**✅ No HIGH/CRITICAL vulnerabilities found**"
              table   = ""
          else:
              parts   = [f"{counts[s]} {s}" for s in ["CRITICAL", "HIGH"] if counts[s]]
              summary = f"**⚠️ Security scan — {', '.join(parts)}** (fixable vulnerabilities only)"
              table   = (
                  "\n| Severity | Package | Installed | Fixed | CVE |\n"
                  "|---|---|---|---|---|\n"
              )
              for _, icon, pkg, inst, fixed, cve_link in rows:
                  table += f"| {icon} | `{pkg}` | {inst} | {fixed} | {cve_link} |\n"

          scan_date = datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          footer    = f"\n_Scan: `{os.environ['IMAGE_REF']}` — {scan_date}_"

          # Idempotent block: replace or prepend at top
          start = "<!-- trivy-scan-tcwlab-start -->"
          end   = "<!-- trivy-scan-tcwlab-end -->"
          block = f"{start}\n{summary}{table}{footer}\n{end}"

          pr_data      = api_get(f"{base_url}/repos/{repo}/pulls/{pr_number}")
          current_body = pr_data.get("body", "") or ""

          if start in current_body:
              new_body = re.sub(
                  re.escape(start) + r".*?" + re.escape(end),
                  block, current_body, flags=re.DOTALL
              )
          else:
              new_body = block + ("\n\n" + current_body if current_body else "")

          status = api_patch(f"{base_url}/repos/{repo}/pulls/{pr_number}", {"body": new_body})
          print(f"PR #{pr_number}: Description updated ({total} findings, HTTP {status})")
          EOF

  # ---------------------------------------------------------------------------
  # Release: Pattern A — directly on main, combined build+push+tag job.
  # Suitable for repos without separate tag-triggered publish pipeline.
  # (Alternative: Pattern B below — auto-tag + publish separate)
  # ---------------------------------------------------------------------------
  release:
    name: Release — multi-arch push + Git tag
    runs-on: ubuntu-22.04
    # ── ADJUST: add lint if lint job is present ─────────────────────────
    needs: [build-test, security]
    if: github.ref == 'refs/heads/main'
    env:
      DOCKER_HOST: tcp://docker-in-docker:2375
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          # ── ADJUST: version extraction from Dockerfile ARG ──────────────
          VER=$(grep '^ARG <TOOL>_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          SHA8="${GITHUB_SHA:0:8}"
          echo "tool_version=${VER}" >> "$GITHUB_OUTPUT"
          echo "sha8=${SHA8}" >> "$GITHUB_OUTPUT"

      - name: Install Docker CLI + buildx
        run: |
          curl -fsSL "${{ env.DOCKER_CLI_URL }}" -o /tmp/docker.tgz
          tar xzf /tmp/docker.tgz --strip-components=1 -C /usr/local/bin docker/docker
          mkdir -p ~/.docker/cli-plugins
          curl -fsSL "https://github.com/docker/buildx/releases/download/v0.19.3/buildx-v0.19.3.linux-amd64" \
            -o ~/.docker/cli-plugins/docker-buildx
          chmod +x ~/.docker/cli-plugins/docker-buildx

      - name: Set up QEMU + buildx
        run: |
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          docker buildx create --name multiarch --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Docker Hub Login
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build & push (multi-arch)
        run: |
          VER="${{ steps.version.outputs.tool_version }}"
          SHA8="${{ steps.version.outputs.sha8 }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --sbom=true --provenance=mode=max \
            # ── ADJUST: --build-arg if ARG is used in Dockerfile ─────────
            # --build-arg <TOOL>_VERSION="${VER}" \
            -t "${{ env.IMAGE }}:${VER}-${SHA8}" \
            -t "${{ env.IMAGE }}:${VER}" \
            -t "${{ env.IMAGE }}:latest" \
            --push .

      - name: Create Git tag
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.tool_version }}"
          SHA8="${{ steps.version.outputs.sha8 }}"
          TAG="v${VER}-${SHA8}"
          PAYLOAD=$(printf '{"tag_name":"%s","target":"%s"}' "${TAG}" "${GITHUB_SHA}")
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/tags")
          echo "Git tag ${TAG} -> HTTP ${HTTP}"

  # ---------------------------------------------------------------------------
  # Pattern B (alternative to release): auto-tag on main, publish on tag event.
  # Uncomment and remove the release job above if desired.
  # Trigger must then contain `tags: ["v*-*"]` (see on.push above).
  # ---------------------------------------------------------------------------
  # auto-tag:
  #   name: Auto-tag release
  #   runs-on: ubuntu-22.04
