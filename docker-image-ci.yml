  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - name: Checkout
  #       env:
  #         GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  #       run: |
  #         git config --global init.defaultBranch main && git init .
  #         git remote add origin \
  #           "https://oauth2:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#https://}/${GITHUB_REPOSITORY}.git"
  #         git fetch --depth=1 origin "${GITHUB_SHA}" && git checkout FETCH_HEAD
  #     - name: Create release tag
  #       env:
  #         FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
  #       run: |
  #         TOOL_VER=$(grep '^ARG <TOOL>_VERSION=' Dockerfile | head -1 | cut -d= -f2)
  #         SHA8="${GITHUB_SHA:0:8}"
  #         TAG="v${TOOL_VER}-${SHA8}"
  #         PAYLOAD=$(printf '{"tag_name":"%s","target":"%s"}' "${TAG}" "${GITHUB_SHA}")
