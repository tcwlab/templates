# ─────────────────────────────────────────────────────────────────────────────
# tcwlab / templates / service-ci.yml
#
# CI template for service projects (Kotlin/Micronaut, Go).
# Linting runs via tcwlab/betterlint. Build jobs are placeholders.
# ─────────────────────────────────────────────────────────────────────────────

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BETTERLINT_VERSION: "2.12.0"

jobs:

  # ---------------------------------------------------------------------------
  lint:
    name: Lint (betterlint, OpenAPI, Gherkin)
    runs-on: ubuntu-22.04
    container:
      image: tcwlab/betterlint:${{ env.BETTERLINT_VERSION }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint (betterlint)
        run: betterlint --dir .

      - name: OpenAPI Lint
        run: |
          mapfile -t specs < <(find . -name 'openapi.yaml' -not -path './.git/*')
          [ "${#specs[@]}" -eq 0 ] && exit 0
          spectral lint --ruleset .spectral.yaml --fail-severity=error "${specs[@]}"

      - name: Gherkin Syntax
        run: |
          mapfile -t features < <(find . -name '*.feature' -not -path './.git/*')
          [ "${#features[@]}" -eq 0 ] && exit 0
          python3 - <<'PY'
          import os, sys, pathlib
          from gherkin.parser import Parser
          from gherkin.token_scanner import TokenScanner
          parser = Parser()
          errors = 0
          for f in open('/dev/stdin').read().strip().splitlines():
              if not f: continue
              src = pathlib.Path(f).read_text(encoding='utf-8')
              try:
                  parser.parse(TokenScanner(src)); print(f'OK   {f}')
              except Exception as e:
                  print(f'FAIL {f}: {e}', file=sys.stderr); errors += 1
          sys.exit(1 if errors else 0)
          PY

  # ---------------------------------------------------------------------------
  # TODO: Add build job here (Kotlin: ./gradlew build / Go: go build)
  # build:
  #   name: Build
  #   runs-on: ubuntu-22.04
  #   needs: [lint]
  #   steps: ...
